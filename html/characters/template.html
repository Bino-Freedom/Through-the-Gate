<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Page</title>
    <link rel="stylesheet" href="../../css/menu.css">
    <link rel="stylesheet" href="../../css/pageStyle.css">
    <link rel="stylesheet" href="../../css/charInfoPage.css">
</head>

<body>
    <header id="menu-placeholder"></header>

    <main class="main-container">
        <!-- Thông tin nhân vật -->
        <section class="character-info">
            <div class="info-box">
                <img id="splash-art" src="" alt="Character Splash Art" class="splash-art">
                <div class="info-content">
                    <div class="character-header">
                        <h1 id="char-name" class="character-name"></h1>
                        <div class="character-tags">
                            <img id="char-rarity" src="" alt="Rarity" class="tag-icon">
                            <img id="char-class" src="" alt="Class" class="tag-icon">
                            <img id="char-class2" src="image/tags/water.png" alt="Secondary Class" class="tag-icon">
                        </div>
                    </div>

                    <div class="stats-section">
                        <div class="stats-grid" id="stats-box">
                            <!-- Stats sẽ được thêm bằng JS -->
                        </div>
                        <div class="level-control">
                            <input type="range" class="level-slider" min="1" max="100" value="1">
                            <p>Level: <span class="lv-value">1</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Thiên phú -->
        <section class="talents-section">
            <h2 class="section-title">Thiên phú</h2>
            <div class="talents-grid" id="talents-container">
                <!-- Talents sẽ được thêm bằng JS -->
            </div>
        </section>

        <!-- Kỹ năng -->
        <section class="skills-section">
            <h2 class="section-title">Kỹ năng</h2>
            <div class="skills-interface">
                <div class="skills-selector">
                    <div class="skill-buttons" id="skill-buttons">
                        <!-- Skill buttons sẽ được thêm bằng JS -->
                    </div>
                    <div class="skill-level-control">
                        <input type="range" class="skill-level-slider" min="1" max="10" value="1">
                        <p>Level: <span class="skill-lv-value">1</span></p>
                    </div>
                </div>
                <div class="skill-details">
                    <h3 class="skill-name" id="current-skill-name">Tên kỹ năng</h3>
                    <div class="skill-description">
                        <img class="skill-icon" id="current-skill-icon" src="../../image/menu/page_icon.png"
                            alt="Skill Icon">
                        <div class="skill-text">
                            <p class="skill-desc" id="current-skill-desc">Mô tả kỹ năng</p>
                            <p class="skill-additional" id="current-skill-add">Thông tin bổ sung</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dấu ấn sức mạnh -->
        <section class="power-seal-section">
            <h2 class="section-title">Dấu ấn sức mạnh</h2>
            <div class="power-seal-container" id="power-seal">
                <!-- Power seal content sẽ được thêm sau -->
            </div>
        </section>
    </main>

    <script src="../../js/menuLoader.js"></script>
    <script src="../../js/charLoader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const charName = params.get('char');

            if (charName) {
                loadCharacter(`${charName.toLowerCase()}.json`);
            } else {
                console.error("Không tìm thấy tên nhân vật trong URL");
            }
        });
    </script>
</body>

</html>
